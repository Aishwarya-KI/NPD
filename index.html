<html lang="en">

<title>Kumar Industries — NPD Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f6f6f4;--bg3:#eeede9;
  --text:#1a1a1a;--text2:#5c5c58;--text3:#9c9c96;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;
  --green:#3B6D11;--green-lt:#EAF3DE;
  --amber:#BA7517;--amber-lt:#FAEEDA;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --purple:#534AB7;--purple-lt:#EEEDFE;
  --teal:#0F6E56;--teal-lt:#E1F5EE;
  --r:10px;--rl:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0C447C 0%,#185FA5 50%,#1a7abf 100%);}
.login-card{background:white;border-radius:16px;padding:2.5rem;width:380px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{width:48px;height:48px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.login-logo svg{width:28px;height:28px;}
.login-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:1.5rem;}
.login-field{margin-bottom:14px;}
.login-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:5px;}
.login-input{width:100%;border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;transition:border-color 0.15s;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;background:var(--blue);color:white;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.login-btn:hover{background:var(--blue-dk);}
.login-error{background:var(--red-lt);color:var(--red);border-radius:7px;padding:8px 12px;font-size:12px;margin-top:10px;display:none;}
.login-loading{text-align:center;color:var(--text2);font-size:13px;margin-top:10px;display:none;}

/* APP */
#app-screen{display:none;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:1.25rem 0;position:fixed;top:0;left:0;height:100vh;z-index:10;overflow-y:auto;}
.main{margin-left:230px;padding:1.5rem;flex:1;min-width:0;}
.logo-wrap{padding:0 1.25rem 1rem;border-bottom:0.5px solid var(--border);margin-bottom:0.75rem;}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:7px;}
.logo-icon svg{width:20px;height:20px;}
.logo-name{font-size:13px;font-weight:700;color:var(--text);}
.logo-sub{font-size:10px;color:var(--text3);}
.user-pill{margin:0 1rem 0.5rem;background:var(--blue-lt);border-radius:8px;padding:8px 10px;}
.user-name{font-size:12px;font-weight:700;color:var(--blue-dk);}
.user-role{font-size:10px;color:var(--blue);margin-top:1px;}
.nav-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 1.25rem;margin:0.75rem 0 0.3rem;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 1.25rem;font-size:12.5px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all 0.1s;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:600;}
.nav-item.hidden-nav{display:none;}
.sidebar-footer{margin-top:auto;padding:0.75rem 1.25rem 0;border-top:0.5px solid var(--border);}
.logout-btn{width:100%;background:none;border:0.5px solid var(--border2);border-radius:7px;padding:7px;font-size:12px;cursor:pointer;color:var(--text2);margin-bottom:6px;}
.logout-btn:hover{background:var(--red-lt);color:var(--red);border-color:var(--red);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:var(--text2);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
.page-title{font-size:18px;font-weight:700;color:var(--text);}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.btn-primary{background:var(--blue);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{background:var(--blue-dk);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px;}
.btn-outline{background:none;border:0.5px solid var(--border2);border-radius:7px;padding:6px 13px;font-size:12px;cursor:pointer;color:var(--text2);}
.btn-outline:hover{background:var(--bg2);}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.stat-val{font-size:26px;font-weight:700;}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem;}
.card-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.4px;}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.b-enquiry{background:var(--blue-lt);color:var(--blue-dk);}
.b-apqp{background:var(--amber-lt);color:#633806;}
.b-tooling{background:var(--purple-lt);color:#3C3489;}
.b-ppap{background:var(--teal-lt);color:#085041;}
.b-approved{background:var(--green-lt);color:#27500A;}
.b-hold{background:var(--red-lt);color:#791F1F;}
.b-pass{background:var(--green-lt);color:#27500A;}
.b-fail{background:var(--red-lt);color:#791F1F;}
.b-conditional{background:var(--amber-lt);color:#633806;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;padding:8px 12px;border-bottom:0.5px solid var(--border);}
.tbl td{padding:11px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;font-size:13px;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr.clickable{cursor:pointer;transition:background 0.1s;}
.tbl tbody tr.clickable:hover td{background:var(--bg2);}
.tbl tbody tr.sel td{background:var(--blue-lt);}

/* GATE BAR */
.gate-bar{display:flex;align-items:center;gap:2px;min-width:190px;}
.g-seg{flex:1;}
.g-lbl{font-size:9px;color:var(--text3);margin-bottom:2px;text-align:center;}
.g-bar{height:6px;border-radius:3px;}
.g-bar.done{background:var(--green);}
.g-bar.active{background:var(--blue);}
.g-bar.pending{background:var(--border2);}

/* DRAWER */
.drawer{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.5rem;margin-bottom:1.25rem;}
.drawer-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);}
.drawer-title{font-size:15px;font-weight:700;}
.drawer-sub{font-size:12px;color:var(--text2);margin-top:3px;}

/* INFO TILES */
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.info-tile{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.info-key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;font-weight:600;}
.info-val{font-size:13px;font-weight:600;color:var(--text);}

/* TABS */
.tab-row{display:flex;gap:2px;background:var(--bg2);border-radius:10px;padding:4px;width:fit-content;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:7px;font-weight:500;transition:all 0.1s;}
.tab.active{background:var(--blue);color:white;font-weight:700;}
.tab:hover:not(.active){background:var(--bg3);}

/* CHECKLIST */
.cl-block{background:var(--bg2);border-radius:var(--r);padding:1rem;}
.cl-block-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.cl-item:last-child{border-bottom:none;}
.cl-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.1s;}
.cl-check.checked{background:var(--green);border-color:var(--green);}
.cl-check.checked::after{content:'';width:9px;height:5px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.cl-check.disabled{opacity:0.4;cursor:not-allowed;}
.cl-prog{display:flex;align-items:center;gap:8px;margin-top:8px;}
.cl-prog-bar{flex:1;height:4px;background:var(--border2);border-radius:2px;}
.cl-prog-fill{height:4px;border-radius:2px;background:var(--green);transition:width 0.3s;}
.cl-prog-lbl{font-size:11px;color:var(--text3);}

/* APPROVAL */
.approval-box{border:1.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px;}
.approval-box.approved{border-color:var(--green);background:var(--green-lt);}
.approval-box.rejected{border-color:var(--red);background:var(--red-lt);}

/* ACTIONS */
.act-tbl{width:100%;border-collapse:collapse;}
.act-tbl th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;padding:6px 10px;border-bottom:0.5px solid var(--border);text-align:left;}
.act-tbl td{padding:9px 10px;border-bottom:0.5px solid var(--border);font-size:12px;vertical-align:middle;}
.act-tbl tr:last-child td{border-bottom:none;}
.pdot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.pdot.high{background:var(--red);}
.pdot.med{background:var(--amber);}
.pdot.low{background:var(--green);}
.btn-done{background:none;border:0.5px solid var(--border2);border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--green);}
.btn-done:hover{background:var(--green-lt);}

/* TRIAL */
.trial-block{background:var(--bg2);border-radius:var(--r);padding:1rem;margin-bottom:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1.25rem;}
.f-row{margin-bottom:12px;}
.f-lbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:4px;}
.f-row input,.f-row select,.f-row textarea{width:100%;border:0.5px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color 0.15s;}
.f-row input:focus,.f-row select:focus,.f-row textarea:focus{border-color:var(--blue);}
.f-row textarea{resize:vertical;min-height:70px;}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border);}
.btn-cancel{background:none;border:0.5px solid var(--border2);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text);}
.btn-save{background:var(--blue);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}

.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
.chip{display:inline-block;background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;padding:2px 9px;font-size:11px;margin-right:4px;}
.dev-note{background:var(--amber-lt);border-radius:8px;padding:10px 14px;font-size:12px;color:#633806;margin-bottom:1rem;}
.sync-indicator{position:fixed;bottom:16px;right:16px;background:var(--green);color:white;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;z-index:100;display:none;}
.sync-indicator.saving{background:var(--amber);}
@media print{.sidebar,.btn-primary,.btn-outline,.no-print{display:none!important;}.main{margin-left:0!important;padding:0!important;}}
</style>
</head>

  3:['Dimensional report (balloon drawing)','Balloon drawing (PPAP final)','Material certificate','PFMEA final','Control plan approved','PSW (Part Submission Warrant)','Appearance Approval Report (AAR)','Customer PPAP submission acknowledgement'],
  4:['SOP / Work instruction approved','Packaging standard & label approval','Customer-specific requirements (CSR) checklist complete','First Article Inspection (FAI) report approved','Mass production readiness sign-off']
};

function makeEmptyChecklist(){
  const c={};
  for(let g=0;g<5;g++) GATE_CHECKLISTS[g].forEach(i=>c[g+'-'+i]=false);
  return c;
}

// ═══════════════════════════════════════════════
function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const loadEl = document.getElementById('login-loading');
  errEl.style.display='none';
  loadEl.style.display='block';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(err=>{
      loadEl.style.display='none';
      errEl.style.display='block';
      errEl.textContent = err.code==='auth/wrong-password'||err.code==='auth/user-not-found'
        ? 'Invalid email or password. Please try again.'
        : 'Login failed: '+err.message;
    });
}

function doLogout(){
  if(projectsListener) projectsListener();
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    const email = user.email.toLowerCase();
    currentUserInfo = USER_ROLES[email] || {role:'Viewer',canEdit:false,canApprove:false,canAddProject:false,reportsAccess:false};
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('sidebar-name').textContent = email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    document.getElementById('sidebar-role').textContent = currentUserInfo.role;
    // Hide nav items based on role
    if(!currentUserInfo.reportsAccess) document.getElementById('nav-reports').style.display='none';
    startListening();
    renderPage('dashboard');
  } else {
    currentUser=null; currentUserInfo=null; projects=[];
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    document.getElementById('login-loading').style.display='none';
  }
});

// ═══════════════════════════════════════════════
// FIRESTORE LIVE LISTENER
// ═══════════════════════════════════════════════
function startListening(){
  if(projectsListener) projectsListener();
  projectsListener = db.collection('projects').orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      projects = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPage(currentPage);
    }, err=>console.error('Listener error:',err));
}

function showSync(saving=false){
  const el=document.getElementById('sync-ind');
  el.textContent=saving?'Saving...':'Saved ✓';
  el.className='sync-indicator'+(saving?' saving':'');
  el.style.display='block';
  if(!saving) setTimeout(()=>el.style.display='none',2000);
}

// ═══════════════════════════════════════════════
// FIRESTORE CRUD
// ═══════════════════════════════════════════════
async function saveProject(data){
  showSync(true);
  try{
    if(data.id && !data.id.startsWith('new_')){
      const {id,...rest}=data;
      await db.collection('projects').doc(id).set(rest,{merge:true});
    } else {
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      data.createdBy=currentUser.email;
      delete data.id;
      await db.collection('projects').add(data);
    }
    showSync(false);
  }catch(e){console.error(e);showSync(false);}
}

async function updateProjectField(id,fields){
  showSync(true);
  try{
    await db.collection('projects').doc(id).update(fields);
    showSync(false);
  }catch(e){console.error(e);showSync(false);}
}

function setPage(name,el){

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function badge(s){
  const m={enquiry:'Enquiry',apqp:'APQP',tooling:'Tooling',ppap:'PPAP & Trials',approved:'Approved',hold:'On Hold'};
  return `<span class="badge b-${s}">${m[s]||s}</span>`;
}
function daysLeft(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function fmt(n){return n>=0?'+₹'+n:'−₹'+Math.abs(n);}
function gateProgress(p,g){
  const items=GATE_CHECKLISTS[g]||[];
  const cl=p.checklist||{};
  const done=items.filter(i=>cl[g+'-'+i]).length;
  return {done,total:items.length,pct:Math.round(done/items.length*100)||0};
}
function overallPct(p){
  const all=Object.values(p.checklist||{});
  if(!all.length) return 0;
  return Math.round(all.filter(Boolean).length/all.length*100);
}
function openActs(p){return (p.actions||[]).filter(a=>!a.done);}
function allOpenActs(){return projects.flatMap(p=>openActs(p).map(a=>({...a,partName:p.partName,pid:p.id})));}
function gateApproval(p,g){return (p.gateApprovals||[]).find(a=>a.gate===g);}
function isGateLocked(p,g){const a=gateApproval(p,g);return a&&a.status==='approved';}
function canRequestApproval(p,g){
  if(g!==p.currentGate) return false;
  const prog=gateProgress(p,g);
  const existing=gateApproval(p,g);
  return prog.done===prog.total && (!existing||existing.status==='rejected');
}
function canApproveGate(g){
  if(!currentUserInfo) return false;
  return GATE_APPROVER_EMAILS[g]&&GATE_APPROVER_EMAILS[g].includes(currentUser.email);
}
function canEdit(){return currentUserInfo&&currentUserInfo.canEdit;}
function gBarClass(p,i){
  if(isGateLocked(p,i)) return 'done';
  if(i===p.currentGate) return 'active';
  return 'pending';
}

function gateTabHTML(p){
  const canE=canEdit();
  let html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;">';
  for(let g=0;g<5;g++){
    const prog=gateProgress(p,g);
    const isActive=g===(p.currentGate||0);
    const isLocked=isGateLocked(p,g);
    const isFuture=g>(p.currentGate||0);
    const appr=gateApproval(p,g);
    const borderColor=isLocked?'var(--green)':isActive?'var(--blue)':'var(--border)';
    const items=GATE_CHECKLISTS[g]||[];
    html+=`<div style="background:var(--bg2);border:1.5px solid ${borderColor};border-radius:var(--r);padding:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:12px;font-weight:700;color:${isLocked?'var(--green)':isActive?'var(--blue)':'var(--text3)'};">Gate ${g+1}: ${GATE_SHORT[g]}</div>
        ${isLocked?'<span style="font-size:10px;background:var(--green-lt);color:var(--green);padding:2px 8px;border-radius:10px;font-weight:700;">✓ APPROVED</span>':isActive?'<span style="font-size:10px;background:var(--blue-lt);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:700;">ACTIVE</span>':'<span style="font-size:10px;color:var(--text3);">'+( g<(p.currentGate||0)?'Completed':'Locked')+'</span>'}
      </div>
      <div class="cl-prog" style="margin-bottom:10px;">
        <div class="cl-prog-bar"><div class="cl-prog-fill" style="width:${prog.pct}%;background:${isLocked?'var(--green)':isActive?'var(--blue)':'var(--text3)'}"></div></div>
        <div class="cl-prog-lbl">${prog.done}/${prog.total}</div>
      </div>
      ${items.map(item=>{
        const key=g+'-'+item;
        const checked=(p.checklist||{})[key];
        const disabled=isFuture||isLocked||!canE||!isActive;
        return `<div class="cl-item">
          <div class="cl-check${checked?' checked':''}${disabled?' disabled':''}" onclick="${disabled?'':'toggleCheck(\''+p.id+'\',\''+key.replace(/'/g,"\\'")+'\')'}" title="${disabled?(isLocked?'Approved — locked':isFuture?'Future gate':'View only'):'Click to toggle'}"></div>
          <div style="font-size:12px;color:var(--text);${checked?'text-decoration:line-through;color:var(--text3)':''}">${item}</div>
        </div>`;
      }).join('')}
      ${isActive&&!isLocked?`<div style="margin-top:10px;">
        ${canRequestApproval(p,g)&&canApproveGate(g)?
          `<button class="btn-primary btn-sm" style="width:100%;" onclick="openApprovalModal('${p.id}',${g})">Approve Gate ${g+1} →</button>`:
          canRequestApproval(p,g)?
          `<div style="font-size:11px;color:var(--amber);background:var(--amber-lt);border-radius:6px;padding:7px;margin-top:4px;">All items complete. Awaiting ${GATE_APPROVER_ROLES[g]} approval.</div>`:
          appr&&appr.status==='rejected'?
          `<div style="font-size:11px;color:var(--red);background:var(--red-lt);border-radius:6px;padding:7px;">Rejected: ${appr.remark}</div>${canApproveGate(g)?`<button class="btn-primary btn-sm" style="width:100%;margin-top:6px;" onclick="openApprovalModal('${p.id}',${g})">Re-evaluate →</button>`:''}`:
          `<div style="font-size:11px;color:var(--text3);margin-top:4px;">Complete ${prog.total-prog.done} more item(s) to request approval from ${GATE_APPROVER_ROLES[g]}.</div>`
        }
      </div>`:''}
      ${isLocked&&appr?`<div style="margin-top:8px;font-size:11px;color:var(--green);border-top:0.5px solid var(--border);padding-top:6px;">✓ ${appr.approverName} · ${appr.date}</div>`:''}
    </div>`;
    if(g===1) html+='</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;">';
  }
  html+='</div>';
  return html;
}

function actionsTabHTML(p){
  const open=openActs(p);
  const canE=canEdit();
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div style="font-size:12px;font-weight:700;color:var(--text2);">${open.length} open action(s)</div>
    ${canE?`<button class="btn-primary btn-sm" onclick="openAddActionModal('${p.id}')">+ Add Action</button>`:''}
  </div>
  ${open.length?`<table class="act-tbl">

function renderGantt(){
  const el=document.getElementById('pg-gantt');
  if(!projects.length){el.innerHTML='<div class="topbar"><div><div class="page-title">Timeline</div></div></div><div class="card"><div class="empty">No projects yet.</div></div>';return;}
  const now=new Date();
  const allD=projects.flatMap(p=>[new Date(p.startDate||new Date()),new Date(p.targetDate||new Date())]);
  const minD=new Date(Math.min(...allD)),maxD=new Date(Math.max(...allD));
  const span=(maxD-minD)||1;
  el.innerHTML=`
  <div class="topbar"><div><div class="page-title">Project Timeline</div><div class="page-sub">Red line = today</div></div></div>
  <div class="card"><div style="overflow-x:auto;"><table style="width:100%;min-width:700px;border-collapse:collapse;">
    <thead><tr>
      <th style="text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:8px 12px;border-bottom:0.5px solid var(--border);width:180px;">Part</th>
      <th style="text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:8px 12px;border-bottom:0.5px solid var(--border);">Timeline</th>
      <th style="text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:8px 12px;border-bottom:0.5px solid var(--border);width:100px;">Target</th>
    </tr></thead>
    <tbody>${projects.map(p=>{
      const s=new Date(p.startDate||minD),e=new Date(p.targetDate||maxD);
      const lp=((s-minD)/span*100).toFixed(1);
      const wp=((e-s)/span*100).toFixed(1);
      const np=Math.min(100,Math.max(0,(now-minD)/span*100)).toFixed(1);
      const col=STATUS_COLOR[p.status]||'#185FA5';
      return `<tr>
        <td style="padding:10px 12px;font-weight:600;font-size:12px;border-bottom:0.5px solid var(--border);">${p.partName}<div style="font-size:11px;color:var(--text3);">${p.customer}</div></td>
        <td style="padding:10px 12px;border-bottom:0.5px solid var(--border);">
          <div style="position:relative;height:18px;background:var(--bg2);border-radius:4px;">
            <div style="position:absolute;left:${lp}%;width:${wp}%;height:18px;background:${col};border-radius:4px;opacity:0.8;"></div>
            <div style="position:absolute;left:${np}%;top:-2px;width:2px;height:22px;background:var(--red);"></div>
          </div>
        </td>
        <td style="padding:10px 12px;font-size:12px;border-bottom:0.5px solid var(--border);">${p.targetDate||'—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

async function toggleCheck(pid,key){
  if(!canEdit()){alert('You do not have edit access.');return;}
  const p=projects.find(x=>x.id===pid);
  if(!p) return;
  const g=parseInt(key.split('-')[0]);
  if(isGateLocked(p,g)){alert('This gate is locked after approval.');return;}
  if(g!==(p.currentGate||0)){alert('You can only update the active gate checklist.');return;}
  const newVal=!((p.checklist||{})[key]);
  await updateProjectField(pid,{['checklist.'+key]:newVal});
}

async function markActionDone(pid,idx){
  if(!canEdit()) return;
  const p=projects.find(x=>x.id===pid);
  if(!p) return;
  const actions=[...(p.actions||[])];
  const open=actions.filter(a=>!a.done);
  if(open[idx]) open[idx].done=true;
  await updateProjectField(pid,{actions});
}

async function saveApproval(pid,gate){
  const name=document.getElementById('ap-name').value.trim();
  const role=document.getElementById('ap-role').value;
  const decision=document.getElementById('ap-dec').value;
  const remark=document.getElementById('ap-rem').value.trim();
  const custName=document.getElementById('ap-cn').value.trim();
  const custDate=document.getElementById('ap-cd').value;
  if(!name){alert('Approver name is required.');return;}
  const p=projects.find(x=>x.id===pid);
  const today=new Date().toISOString().split('T')[0];
  const approvals=[...(p.gateApprovals||[]).filter(a=>a.gate!==gate)];
  approvals.push({gate,status:decision,approverRole:role,approverName:name,date:today,remark,customerApproval:custName?{name:custName,date:custDate}:null});
  let updates={gateApprovals:approvals};
  if(decision==='approved'){
    const gs=[...(p.gateStatus||[0,0,0,0,0])];
    gs[gate]=2;
    const statusMap={0:'enquiry',1:'apqp',2:'tooling',3:'ppap',4:'approved'};
    if(gate<4){gs[gate+1]=1;updates.currentGate=gate+1;updates.status=statusMap[gate+1];}
    else{updates.status='approved';}
    updates.gateStatus=gs;
  }
  await updateProjectField(pid,updates);
  closeModal();
  selectedId=pid;
}

async function saveNewProject(){
  const v=id=>document.getElementById(id).value;
  if(!v('np-name')||!v('np-cust')){alert('Part Name and Customer are required.');return;}
  const today=new Date().toISOString().split('T')[0];
  const rev=v('np-rev')||'A';
  const data={
    partName:v('np-name'),partNo:v('np-no')||'KI-000',drawingRev:rev,customer:v('np-cust'),
    status:'enquiry',targetPrice:parseFloat(v('np-tp'))||0,quotedPrice:parseFloat(v('np-qp'))||0,
    toolingCost:parseFloat(v('np-tc'))||0,toolingActual:0,partCostTarget:parseFloat(v('np-tp'))||0,
    partCostActual:0,startDate:v('np-sd')||today,targetDate:v('np-td')||today,
    ppapLevel:v('np-ppap')||'Level 3',ppapStatus:'Not started',deviations:v('np-dev')||'None',
    currentGate:0,gateStatus:[1,0,0,0,0],checklist:makeEmptyChecklist(),
    gateApprovals:[],actions:[],trials:[],commLog:[],
    drawingRevisions:[{rev,date:today,changes:'Initial release',approvedBy:currentUser.email.split('@')[0]}],
    documents:[]
  };
  await saveProject(data);
  closeModal();
}
